# Publish unsigned rawduck loadable binaries to GitHub Pages (INSTALL FROM ...)
# and attach a linux bundle tarball (duckdb shell + extension) to GitHub Releases.
#
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions.
#
# Layout after deploy:
#   https://quackscience.github.io/rawduck/v1.5.3/linux_amd64/rawduck.duckdb_extension.gz
#
# Users:
#   SET allow_unsigned_extensions = true;
#   INSTALL rawduck FROM 'https://quackscience.github.io/rawduck';
#   LOAD rawduck;
#
# Note: deploy-pages replaces the whole site each run (one DuckDB version hosted).
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Git tag for the linux bundle tarball (manual runs; optional)'
        required: false
        type: string
      skip_pages:
        description: 'Skip GitHub Pages packaging and deploy'
        required: false
        default: false
        type: boolean
      skip_tarball:
        description: 'Skip linux bundle tarball upload'
        required: false
        default: false
        type: boolean

concurrency:
  group: pages
  cancel-in-progress: false

env:
  EXT_NAME: rawduck
  DUCKDB_VERSION: v1.5.3
  RELEASE_ASSET: rawduck-linux-amd64
  PAGES_BASE_URL: https://quackscience.github.io/rawduck

jobs:
  build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.3
      ci_tools_version: v1.5-variegata
      extension_name: rawduck
      exclude_archs: 'windows_amd64;windows_arm64;windows_amd64_mingw;windows_amd64_rtools'

  package-pages:
    name: Package extension repository
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || inputs.skip_pages != true
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ${{ env.EXT_NAME }}-${{ env.DUCKDB_VERSION }}-extension-*

      - name: Assemble GitHub Pages tree
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          prefix="${EXT_NAME}-${DUCKDB_VERSION}-extension-"
          found=0
          mkdir -p _site
          for dir in artifacts/${prefix}*/; do
            arch="$(basename "$dir")"
            arch="${arch#${prefix}}"
            src="${dir}${EXT_NAME}.duckdb_extension"
            if [[ ! -f "$src" ]]; then
              echo "::warning::no ${EXT_NAME}.duckdb_extension in ${dir}, skipping ${arch}"
              continue
            fi
            out="_site/${DUCKDB_VERSION}/${arch}"
            mkdir -p "$out"
            cp "$src" work.bin
            truncate -s -256 work.bin
            dd if=/dev/zero bs=256 count=1 status=none >> work.bin
            gzip -n < work.bin > "${out}/${EXT_NAME}.duckdb_extension.gz"
            rm -f work.bin
            echo "packaged ${arch}"
            found=$((found + 1))
          done
          if [[ "$found" -eq 0 ]]; then
            echo "::error::no extension binaries found to package"
            exit 1
          fi
          echo "Packaged ${found} platform(s) for ${DUCKDB_VERSION}"

      - name: Write landing page
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en"><head><meta charset="utf-8"><title>rawduck extension repository</title></head><body>'
            echo '<h1>rawduck</h1>'
            echo "<p>Unsigned DuckDB extension repository. Requires DuckDB ${DUCKDB_VERSION}.</p>"
            echo '<pre>SET allow_unsigned_extensions = true;'
            echo "INSTALL ${EXT_NAME} FROM '${PAGES_BASE_URL}';"
            echo "LOAD ${EXT_NAME};</pre>"
            echo '<h2>Available binaries</h2><ul>'
            while IFS= read -r rel; do
              echo "  <li><a href=\"${rel}\">${rel}</a></li>"
            done < <(cd _site && find . -name '*.duckdb_extension.gz' | sort | sed 's|^\./||')
            echo '</ul></body></html>'
          } > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: package-pages
    if: github.event_name == 'release' || inputs.skip_pages != true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-linux-bundle:
    name: Build linux amd64 bundle tarball
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >-
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tarball != true && inputs.release_tag != '')
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref }}
          submodules: recursive

      - name: Pin DuckDB ${{ env.DUCKDB_VERSION }}
        run: |
          cd duckdb
          git fetch --tags --depth 1 origin tag ${{ env.DUCKDB_VERSION }}
          git checkout ${{ env.DUCKDB_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache zlib1g-dev

      - name: Build DuckDB + rawduck
        run: GEN=ninja make release

      - name: Package release tarball
        run: |
          mkdir -p "dist/${RELEASE_ASSET}"
          cp build/release/duckdb "dist/${RELEASE_ASSET}/"
          mkdir -p "dist/${RELEASE_ASSET}/extension/rawduck"
          cp build/release/extension/rawduck/rawduck.duckdb_extension \
            "dist/${RELEASE_ASSET}/extension/rawduck/"
          {
            echo "tag=${RELEASE_TAG}"
            echo "duckdb=${{ env.DUCKDB_VERSION }}"
            echo "commit=${{ github.sha }}"
          } > "dist/${RELEASE_ASSET}/VERSION"
          tar -czf "dist/${RELEASE_ASSET}-${RELEASE_TAG}.tar.gz" -C dist "${RELEASE_ASSET}"
          ls -lh dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/${{ env.RELEASE_ASSET }}-${{ env.RELEASE_TAG }}.tar.gz
