#
# RawDuck ↔ Quack integration: build with quack + httpfs and run raw_quack.test
#
name: Quack Integration

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/sql/raw_quack.test'
      - 'CMakeLists.txt'
      - 'extension_config.cmake'
      - '.github/workflows/QuackIntegration.yml'
      - 'duckdb/**'
  workflow_dispatch:

concurrency:
  group: quack-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quack-integration:
    name: rawduck:quack (linux_amd64)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.3
      ci_tools_version: v1.5-variegata
      extension_name: rawduck
      opt_in_archs: 'linux_amd64'
      use_merged_vcpkg_manifest: '1'
      # Same Windows exclusion as MainDistributionPipeline: duckdb v1.5.3 fmt vs MSVC STL.
      exclude_archs: 'windows_amd64;windows_arm64;windows_amd64_mingw;windows_amd64_rtools'
      extra_extension_config: |
        duckdb_extension_load(httpfs
            GIT_URL https://github.com/duckdb/duckdb-httpfs
            GIT_TAG 13e18b3c9f3810334f5972b76a3acc247b28e537
        )
        duckdb_extension_load(quack
            GIT_URL https://github.com/duckdb/duckdb-quack
            GIT_TAG 1693647c152b438aa2a6a9ad71764f99c5a561e0
        )
